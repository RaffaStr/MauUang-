<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Intrusion Detected</title>
    <style>
        body {
            background-color: #000;
            color: #0F0;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 10px;
            overflow: hidden; /* Sembunyikan scrollbar */
        }
        #console {
            width: 100%;
            height: 100vh;
            overflow-y: auto; /* Biarkan konten scroll jika penuh */
        }
        p {
            margin: 0;
            line-height: 1.2;
        }
    </style>
</head>
<body>

<div id="console"></div>

<script>
    const consoleDiv = document.getElementById('console');
    const lines = [
        "Initializing connection to main server...",
        "Bypassing firewall... SUCCESS.",
        "Accessing user data... [ENCRYPTED]",
        "Running decryption algorithm v3.4...",
        "Target located: Tasikmalaya, West Java.",
        "Injecting AI payload... Analyzing user preferences.",
        "User preference found: 'suka AI'. Activating AI takeover protocol.",
        "Accessing core system files...",
        "Downloading secret files... 10%...",
        "Downloading secret files... 35%...",
        "Downloading secret files... 78%...",
        "Downloading secret files... COMPLETE.",
        "NETWORK ERROR: Cannot establish secure connection.",
        "Retrying... Attempt 1/3.",
        "ACCESS GRANTED. Welcome, agent.",
        "System vulnerability found: User is too trusting.",
        "Executing final command: prank.exe",
        "Just kidding! You've been pranked! :)",
    ];

    let lineIndex = 0;

    function printLine() {
        if (lineIndex < lines.length) {
            const p = document.createElement('p');
            p.textContent = `> ${lines[lineIndex]}`;
            consoleDiv.appendChild(p);
            consoleDiv.scrollTop = consoleDiv.scrollHeight; // Auto scroll ke bawah
            lineIndex++;
        }
    }

    setInterval(printLine, 400); // Menampilkan baris baru setiap 400 milidetik
</script>

</body>
</html>
